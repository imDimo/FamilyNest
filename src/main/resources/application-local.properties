spring.application.name=familynest

# Local dev profile: run without Docker, MariaDB, or Redis
spring.docker.compose.enabled=false

# Use in-memory H2 for local runs
spring.datasource.url=jdbc:h2:mem:familynest;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Avoid requiring Redis when running locally
spring.session.store-type=none

# Optional: H2 console for debugging
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
