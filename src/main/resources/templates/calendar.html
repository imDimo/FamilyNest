ï»¿<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org/">
<head>
    <meta charset="ISO-8859-1">
    <title>FamilyNest</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/calendar-style.css">
    <script src="js/lib/stomp.min.js" defer></script>
    <script src="js/lib/sockjs.min.js" defer></script>
    <script src="js/calendar.js" defer></script>
    <script src="js/display.js" defer></script>
</head>
<body>
    <div class="header flex">
        <h2 class="page-title">Calendar</h2>
        <nav>
            <form action="#" th:action="@{/admin/nav}" method="POST">
                <ul>
                    <li class="inline"><button class="admin" type="submit" name="action" value="manage-users">Manage Members</button></li>
                    <li class="inline"><button class="admin" type="submit" name="action" value="manage-app">Manage FamilyNest</button></li>
                </ul>
            </form>
        </nav>
        <nav>
            <form action="#" th:action="@{/nav}" method="POST">
                <ul>
                    <li class="inline"><button type="submit" name="action" value="calendar">Calendar</button></li>
                    <li class="inline"><button type="submit" name="action" value="gallery">Gallery</button></li>
                    <li class="inline"><button type="submit" name="action" value="settings">Preferences</button></li>
                    <li class="inline"><button type="submit" name="action" value="logout">Log Out</button></li>
                </ul>
            </form>
        </nav>
    </div>

    <div class="flex" style="justify-content: center; padding: 20px;">
        <div class="tile" style="width: 100%; max-width: 1200px;">
            <h2 style="text-align: left; margin-bottom: 15px;">Send Announcement</h2>
            <div style="display: flex; flex-direction: column; gap: 10px; max-width: 1200px;">
                <input type="text" id="announcementTitle" placeholder="Announcement Title" 
                       style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; max-width: 1200px;">
                <textarea id="announcementContent" placeholder="Message..." 
                          style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; height: 60px;"></textarea>
                <button id="announceButton" class="admin" 
                        style="width: 100%; background-color: #9b6dff; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer;">
                    Broadcast to Family
                </button>
            </div>
        </div>
    </div>

    <div class="flex calendar-tiles-container">
        <div class="tile users-tile">
            <h2 class="centered">Members</h2>
            <ul id="users-list">
                <!-- Example list item -- dynamically added by javascript -->
                <!-- <li> -->
                <!--     <div class="user-row"> -->
                <!--         <span>Username</span> -->
                <!--         <span>Status</span> -->
                <!--     </div> -->
                <!-- </li> -->
            </ul>
        </div>

<div id="global-announcement-container"></div>

        <div class="tile calendar-tile">
            <div class="calendar">

                <!-- Month + Year -->
                <h2 th:text="${monthName} + ' ' + ${year}" class="centered"></h2>

                <div class="calendar-weekdays">
                    <div>Sunday</div>
                    <div>Monday</div>
                    <div>Tuesday</div>
                    <div>Wednesday</div>
                    <div>Thursday</div>
                    <div>Friday</div>
                    <div>Saturday</div>
                </div>
                
                <!-- Calendar Days -->
                <div class="calendar-days flex">
                    <div class="calendar-day" th:each="day : ${days}"
                            <span th:text="${day}"></span>
                    </div>
                </div>

            </div>
        </div>
        <div class="tile events-tile">
            <h2 class="centered">Upcoming Events</h2>
            <ul>
                <!-- Example list item -- dynamically added by javascript -->
                <!-- <li> -->
                <!--     <div class="event-row"> -->
                <!--         <span>Event Date</span> -->
                <!--         <span>Event Title</span> -->
                <!--     </div> -->
                <!-- </li> -->
            </ul>
        </div>
    </div>

</body>
</html>
