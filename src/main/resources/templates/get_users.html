<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org/">
    <head>
        <meta charset="ISO-8859-1">
        <title>Users</title>
    </head>
    <body>
        <div>

            <h3>User List</h3>
            <a th:href="@{/users/add}">Add User</a>
            <table style="width:80%" border="1" 
                class = "table table-striped table-responsive-md">
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Password</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user:${allusers}">
                        <td th:text="${user.username}"></td>
                        <td th:text="${user.hashedPassword}"></td>
                        <td> <a th:href="@{/users/update/{id}(id=${user.id})}">Update</a>
                            <a th:href="@{/users/delete/{id}(id=${user.id})}">Delete</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </body>
</html>
